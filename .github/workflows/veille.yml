name: Veille Marches Publics

on:
  schedule:
    - cron: '0 7 1,15 * *'   # Le 1er et le 15 de chaque mois a 7h UTC
  workflow_dispatch:           # Lancement manuel depuis GitHub

permissions:
  contents: write

jobs:
  veille:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run veille agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
        run: python main.py

      - name: Commit seen_ids
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/seen_ids.json || true
          git diff --staged --quiet || git commit -m "Update seen_ids [skip ci]"
          git push || true

      - name: Deploy dashboard to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output
