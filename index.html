<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Veille Marchés — OPTIMA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #F7F7F5;
    --surface:   #FFFFFF;
    --border:    #E2E2DE;
    --text:      #1A1A18;
    --muted:     #7A7A74;
    --accent:    #1A1A18;

    --score-high:   #1C7A4A;
    --score-mid:    #B45309;
    --score-low:    #6B7280;

    --tag-amo:     #EEF2FF; --tag-amo-t:     #3730A3;
    --tag-fin:     #FFF7ED; --tag-fin-t:     #9A3412;
    --tag-ppp:     #F0FDF4; --tag-ppp-t:     #166534;
    --tag-sem:     #FDF4FF; --tag-sem-t:     #6B21A8;
    --tag-enr:     #FFFBEB; --tag-enr-t:     #92400E;
    --tag-autre:   #F9FAFB; --tag-autre-t:   #374151;

    --urg-haute:  #FEE2E2; --urg-haute-t:  #991B1B;
    --urg-moy:    #FEF3C7; --urg-moy-t:    #92400E;
    --urg-fai:    #F0FDF4; --urg-fai-t:    #166534;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
  }

  /* ── Header ── */
  header {
    background: var(--text);
    color: #fff;
    padding: 28px 40px 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
  }
  .header-left h1 {
    font-size: 18px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .header-left p {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.45);
    margin-top: 4px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .header-stats {
    display: flex;
    gap: 32px;
    text-align: right;
  }
  .stat-block span {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
  }
  .stat-block .stat-val {
    font-size: 28px;
    font-weight: 500;
    letter-spacing: -0.02em;
    color: #fff;
  }
  .stat-block .stat-lbl {
    font-size: 10px;
    color: rgba(255,255,255,0.4);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-top: 2px;
  }

  /* ── Toolbar ── */
  .toolbar {
    padding: 16px 40px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    position: sticky;
    top: 0;
    z-index: 10;
  }
  .toolbar-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-right: 4px;
  }
  .filter-btn {
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }
  .sep { width: 1px; height: 20px; background: var(--border); margin: 0 4px; }

  /* ── Grid ── */
  main {
    padding: 28px 40px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }

  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 80px 0;
    color: var(--muted);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 13px;
  }

  /* ── Card ── */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    transition: box-shadow .15s, transform .15s;
  }
  .card:hover {
    box-shadow: 0 4px 20px rgba(0,0,0,0.07);
    transform: translateY(-1px);
  }
  .card[data-hidden="true"] { display: none; }

  /* Card top row */
  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
  }
  .card-badges { display: flex; gap: 6px; flex-wrap: wrap; }

  .badge {
    font-size: 10px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .badge-amo   { background: var(--tag-amo);   color: var(--tag-amo-t); }
  .badge-fin   { background: var(--tag-fin);   color: var(--tag-fin-t); }
  .badge-ppp   { background: var(--tag-ppp);   color: var(--tag-ppp-t); }
  .badge-sem   { background: var(--tag-sem);   color: var(--tag-sem-t); }
  .badge-enr   { background: var(--tag-enr);   color: var(--tag-enr-t); }
  .badge-autre { background: var(--tag-autre); color: var(--tag-autre-t); }

  .badge-urg-haute { background: var(--urg-haute); color: var(--urg-haute-t); }
  .badge-urg-moy   { background: var(--urg-moy);   color: var(--urg-moy-t); }
  .badge-urg-fai   { background: var(--urg-fai);   color: var(--urg-fai-t); }

  /* Score */
  .score-ring {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 20px;
    font-weight: 500;
    min-width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
  }
  .score-ring::after {
    content: '/10';
    font-size: 8px;
    position: absolute;
    bottom: 6px;
    right: 4px;
    opacity: 0.6;
  }
  .score-high { background: #DCFCE7; color: var(--score-high); }
  .score-mid  { background: #FEF3C7; color: var(--score-mid); }
  .score-low  { background: #F3F4F6; color: var(--score-low); }

  /* Card body */
  .card-objet {
    font-size: 13px;
    font-weight: 500;
    line-height: 1.45;
    color: var(--text);
  }
  .card-acheteur {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-acheteur::before {
    content: '';
    display: inline-block;
    width: 4px;
    height: 4px;
    background: var(--border);
    border-radius: 50%;
    flex-shrink: 0;
  }

  .card-resume {
    font-size: 12px;
    color: #4A4A46;
    line-height: 1.55;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: 4px;
    border-left: 2px solid var(--border);
  }

  .card-alert {
    font-size: 11px;
    color: #92400E;
    background: #FFFBEB;
    border-radius: 4px;
    padding: 8px 10px;
    display: flex;
    gap: 6px;
    align-items: flex-start;
  }
  .card-alert::before { content: '⚠'; flex-shrink: 0; }

  /* Meta row */
  .card-meta {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    justify-content: space-between;
    align-items: center;
  }
  .meta-item {
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .meta-lbl {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
  }
  .meta-val {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: var(--text);
    font-weight: 500;
  }
  .card-link {
    font-size: 11px;
    color: var(--muted);
    text-decoration: none;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 4px;
    transition: all .12s;
    white-space: nowrap;
  }
  .card-link:hover {
    background: var(--text);
    color: #fff;
    border-color: var(--text);
  }

  /* ── Responsive ── */
  @media (max-width: 640px) {
    header { padding: 20px; flex-direction: column; align-items: flex-start; }
    .header-stats { text-align: left; }
    .toolbar { padding: 12px 20px; }
    main { padding: 16px 20px 40px; grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Veille Marchés Publics</h1>
    <p>OPTIMA · Mis à jour le 22/04/2026 à 08h17</p>
  </div>
  <div class="header-stats">
    <div class="stat-block">
      <span class="stat-val">0</span>
      <span class="stat-lbl">Opportunités</span>
    </div>
    <div class="stat-block">
      <span class="stat-val">0</span>
      <span class="stat-lbl">Urgentes</span>
    </div>
  </div>
</header>

<div class="toolbar">
  <span class="toolbar-label">Filtrer</span>
  <button class="filter-btn active" data-filter="all">Tous</button>
  <div class="sep"></div>
  <button class="filter-btn" data-filter="type:AMO">AMO</button>
  <button class="filter-btn" data-filter="type:Ingénierie financière">Ing. financière</button>
  <button class="filter-btn" data-filter="type:PPP/Concession">PPP / Concession</button>
  <button class="filter-btn" data-filter="type:SEM/Fonds">SEM / Fonds</button>
  <button class="filter-btn" data-filter="type:ENR-Conseil">ENR</button>
  <div class="sep"></div>
  <button class="filter-btn" data-filter="urg:haute">🔴 Urgent</button>
  <button class="filter-btn" data-filter="urg:moyenne">🟡 Moyen terme</button>
</div>

<main id="grid">

  
    <div class="empty-state">
      Aucune opportunité retenue sur cette période.
    </div>
  

</main>

<script>
  const buttons = document.querySelectorAll('.filter-btn');
  const cards   = document.querySelectorAll('.card');

  buttons.forEach(btn => {
    btn.addEventListener('click', () => {
      buttons.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');

      const filter = btn.dataset.filter;

      cards.forEach(card => {
        if (filter === 'all') {
          card.dataset.hidden = 'false';
          return;
        }
        const [key, val] = filter.split(':');
        let match = false;
        if (key === 'type') match = card.dataset.type === val;
        if (key === 'urg')  match = card.dataset.urgence === val;
        card.dataset.hidden = match ? 'false' : 'true';
      });

      // Afficher empty state si rien
      const visible = [...cards].filter(c => c.dataset.hidden !== 'true').length;
      let empty = document.querySelector('.empty-state');
      if (!empty && visible === 0) {
        empty = document.createElement('div');
        empty.className = 'empty-state';
        empty.textContent = 'Aucune opportunité dans cette catégorie.';
        document.getElementById('grid').appendChild(empty);
      } else if (empty && visible > 0) {
        empty.remove();
      }
    });
  });
</script>

</body>
</html>
